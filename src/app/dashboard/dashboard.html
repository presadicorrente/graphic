<div class="dashboard-container">

  <!-- Logout -->
  <button class="btn logout" (click)="logout()">Logout</button>

  <!-- Nomi squadre e scelta cuffia -->
  <div class="team-names">
    <!-- Squadra Casa -->
    <div class="team-input">
      <label for="teamLocal">Team Casa</label>
      <input #teamLocalInput type="text" id="teamLocal" placeholder="Nome squadra locale">

      <!-- Radio cuffia -->
      <div class="color-select">
        <label>
          <input type="radio" name="localColor" value="azzurro" checked (change)="setLocalColor('azzurro')">
          <span class="color-box" style="background:#30aeea;"></span> Azzurro
        </label>
        <label>
          <input type="radio" name="localColor" value="bianco" (change)="setLocalColor('bianco')">
          <span class="color-box" style="background:#ffffff;"></span> Bianco
        </label>
      </div>
    </div>

    <!-- Squadra Ospite -->
    <div class="team-input">
      <label for="teamGuest">Team Ospite</label>
      <input #teamGuestInput type="text" id="teamGuest" placeholder="Nome squadra ospite">

      <!-- Mostra cuffia ospiti automaticamente -->
      <div class="color-select">
        <span class="color-box" [style.background]="match.team1.color=='azzurro' ? '#ffffff' : '#30aeea'"></span> Cuffia Ospiti
      </div>
    </div>
  </div>

  <!-- Punteggio tutto in orizzontale -->
  <div class="score-controls-horizontal">
    <!-- Casa -->
    <div class="score-team-horizontal">
      <span>Casa</span>
      <div class="score-display" [style.background]="match.team1.color=='azzurro' ? '#30aeea' : '#ffffff'"
           [style.color]="match.team1.color=='azzurro' ? '#001c37' : '#30aeea'">
        {{ match.team1.score }}
      </div>
      <button class="btn-plus" (click)="scoreFirst(1)">+1</button>
      <button class="btn-minus" (click)="scoreFirst(-1)">-1</button>
    </div>

    <!-- Ospiti -->
    <div class="score-team-horizontal">
      <span>Ospiti</span>
      <div class="score-display" [style.background]="match.team2.color=='azzurro' ? '#ffffff' : '#30aeea'"
           [style.color]="match.team2.color=='azzurro' ? '#30aeea' : '#001c37'">
        {{ match.team2.score }}
      </div>
      <button class="btn-plus" (click)="scoreSecond(1)">+1</button>
      <button class="btn-minus" (click)="scoreSecond(-1)">-1</button>
    </div>
  </div>

  <div>
    <div class="period-select">
      <input type="radio" id="first" name="Period" checked (click)="setPeriod(1)"> 
      <label for="first">1° Tempo</label>
      <input type="radio" id="second" name="Period" (click)="setPeriod(2)">
      <label for="second">2° Tempo</label>
      <input type="radio" id="third" name="Period" (click)="setPeriod(3)">
      <label for="third">3° Tempo</label>
      <input type="radio" id="fourth" name="Period" (click)="setPeriod(4)">
      <label for="fourth">4° Tempo</label>
    </div>
  </div>

  <div class="timer-controls">
    <button class="btn" (click)="playPauseTimer()">{{ match.timeRunning ? 'Pausa' : 'Play' }}</button>
    <button class="btn" (click)="resetTimer()">Reset</button>

    <button class="btn" (click)="addTime(10)">+10s</button>
    <button class="btn" (click)="addTime(-10)">-10s</button>
    
      <span>{{ ((match.seconds-match.seconds%60) / 60) | number:'1.0-0' }}:{{ match.seconds%60 | number:'2.0' }}</span>
  </div>

</div>
