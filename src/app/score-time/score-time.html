<div class="screen">
  <div class="scoreboard-horizontal">

    <div class="team local">
      <img class="logo" src="slprg.png" alt="Logo Local">
      <span class="team-name">Stilelibero Preganziol</span>
    </div>

    <div class="cap-indicator" [ngClass]="localColor"></div>

    <div class="score">
      <span>{{ scoreCasa }}</span>
      <span class="dash">|</span>
      <span>{{ scoreOspiti }}</span>
    </div>

    <div class="cap-indicator"
      [ngClass]="localColor === 'azzurro' ? 'bianco' : 'azzurro'">
    </div>

    <div class="team guest">
      <span class="team-name">US Triestina Nuoto</span>
      <img class="logo" src="logotriestina.png" alt="Logo Guest">
    </div>

    <div class="period-display">
      T {{ period }}°
    </div>

    <div class="time-display">
      {{ ((seconds-seconds%60) / 60) | number:'1.0-0' }}:{{ seconds%60 | number:'2.0' }}
    </div>
  </div>
</div>
