<div class="screen">
  <div class="scoreboard-horizontal">

    <div class="team local">
      <img class="logo" src="slprg.png" alt="Logo Local">
      <span class="team-name">Stilelibero Preganziol</span>
    </div>

    <div class="cap-indicator" [ngClass]="match.team1.color"></div>

    <div class="score">
      <span>{{ match.team1.score }}</span>
      <span class="dash">|</span>
      <span>{{ match.team2.score }}</span>
    </div>

    <div class="cap-indicator"
      [ngClass]="match.team1.color === 'azzurro' ? 'bianco' : 'azzurro'">
    </div>

    <div class="team guest">
      <span class="team-name">Rari Nantes Verona</span>
      <img class="logo" src="rnverona.jpeg" alt="Logo Guest">
    </div>

    <div class="period-display">
      T {{ match.period }}°
    </div>

    <div class="time-display">
      {{ ((secondi-secondi%60) / 60) | number:'1.0-0' }}:{{ secondi%60 | number:'2.0' }}
    </div>
  </div>
</div>
